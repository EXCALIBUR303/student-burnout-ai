# ================================================================
# netlify.toml — Burnout AI Frontend Deployment
# ================================================================

[build]
  base    = "burnout-frontend"
  command = "npm run build"
  publish = "build"

[build.environment]
  # Tells the React app which backend to call in production.
  REACT_APP_BACKEND = "https://web-production-43ab4.up.railway.app"
  # CI=false prevents CRA from treating ESLint warnings as build errors
  CI = "false"

# SPA routing — all page-navigation GETs return index.html so React Router works.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
