# Railway deployment config
# startCommand overrides Procfile so Railway runs through sh (PORT expands correctly).
# No healthcheckPath — Railway uses default TCP probe which is far more lenient
# than HTTP probing during model load.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
