# Railway deployment config
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Use the shell script baked into the image — Railway runs startCommand in
# exec form (no shell), so $PORT would be passed literally. The script has
# #!/bin/sh so sh expands ${PORT:-8000} to the real port number.
startCommand = "/app/start.sh"
