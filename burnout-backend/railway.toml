# Explicitly tell Railway to use our Dockerfile (not nixpacks).
# This eliminates any ambiguity about builder selection.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Do NOT set startCommand here — use the Dockerfile CMD which already handles $PORT correctly:
#   CMD ["sh", "-c", "exec uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"]
# Single-quoted strings in railway.toml prevent ${PORT} expansion, causing uvicorn to fail.
healthcheckPath = "/ping"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
